<!DOCTYPE html>

<head>

      <li><button onclick="showPage('personal')" data-page="personal">Personal</button></li>
      <li><button onclick="showPage('professional')" data-page="professional">Professional</button></li>

      <li><button onclick="showPage('contact')" data-page="contact">Contact</button></li>
    </ul>

    <button class="nav-hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  
  <div id="page-container">
    <div id="content" class="page-content"></div>
  </div>
