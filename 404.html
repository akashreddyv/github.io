<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // spa-github-pages pattern: GitHub Pages serves this on any unknown path.
    // Redirect to index.html with the original path as ?p= so the decoder
    // in index.html can restore the clean URL before the router runs.
    var path = window.location.pathname;
    window.location.replace('/?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
